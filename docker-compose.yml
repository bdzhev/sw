services:
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - docker-network
    volumes:
      - ./backend/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/bdzhev/sw-backend:latest
    container_name: backend
    restart: always
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docker-network

  frontend:
    image: ghcr.io/bdzhev/sw-frontend:latest
    container_name: frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      API_URL: ${API_URL}
    depends_on:
      - backend
    networks:
      - docker-network

networks:
  docker-network:
    driver: bridge
